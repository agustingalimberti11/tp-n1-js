<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeBanking - Simulador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Mi cuenta</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Abrir menú">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" href="#movimientos">Movimientos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#tarjetas">Mis Tarjetas</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <!-- Saldo actual -->
    <section class="mb-4" aria-label="Saldo de la cuenta">
      <div class="card card-saldo">
        <div class="card-body">
          <h2 class="h6 text-white-50 mb-1">Saldo disponible</h2>
          <p class="display-6 mb-0" id="saldo-actual">$ 0,00</p>
        </div>
      </div>
    </section>

    <div class="row">
      <!-- Columna: nuevo movimiento + listado -->
      <div class="col-lg-7">
        <section class="mb-4" id="movimientos">
          <h3 class="h5 mb-3">Nuevo movimiento</h3>
          <div class="formulario-movimiento mb-4">
            <form id="form-movimiento" novalidate>
              <div class="mb-3">
                <label for="tipo-movimiento" class="form-label">Tipo</label>
                <select class="form-select" id="tipo-movimiento" required aria-required="true">
                  <option value="deposito">Depósito</option>
                  <option value="extraccion">Extracción</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="monto-movimiento" class="form-label">Monto</label>
                <input type="number" class="form-control" id="monto-movimiento" step="0.01" min="0.01" placeholder="Ej: 1500" required aria-required="true">
              </div>
              <div class="mb-3">
                <label for="descripcion-movimiento" class="form-label">Descripción (opcional)</label>
                <input type="text" class="form-control" id="descripcion-movimiento" placeholder="Ej: Pago por servicios">
              </div>
              <button type="submit" class="btn btn-primary btn-movimiento">Registrar movimiento</button>
            </form>
            <div id="mensaje-movimiento" class="mensaje-usuario" role="status"></div>
          </div>

          <h3 class="h5 mb-3">Pagar servicio</h3>
          <div class="formulario-servicio mb-4">
            <form id="form-servicio" novalidate>
              <div class="mb-3">
                <label for="servicios-select" class="form-label">Servicio</label>
                <select class="form-select" id="servicios-select" required disabled>
                  <option value="">Cargando...</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="monto-servicio" class="form-label">Monto a pagar</label>
                <input type="number" class="form-control" id="monto-servicio" min="0.01" step="0.01" placeholder="Ej: 2500" required aria-required="true">
              </div>
              <div class="mb-3">
                <label for="referencia-servicio" class="form-label">Referencia (opcional)</label>
                <input type="text" class="form-control" id="referencia-servicio" placeholder="Ej: Cliente 2048">
              </div>
              <div class="mb-3">
                <div class="form-label">Detalle</div>
                <div id="detalle-servicio" class="detalle-servicio text-muted small">Seleccioná un servicio.</div>
              </div>
              <button type="submit" class="btn btn-success w-100">Pagar y registrar</button>
            </form>
            <div id="mensaje-servicio" class="mensaje-usuario" role="status"></div>
          </div>

          <h3 class="h5 mb-3">Últimos movimientos</h3>
          <div class="card mb-2">
            <div class="card-body py-3 filtros-movimientos">
              <div class="row g-2 align-items-end">
                <div class="col-md-4">
                  <label for="filtro-tipo-movimiento" class="form-label small mb-1">Tipo</label>
                  <select class="form-select form-select-sm" id="filtro-tipo-movimiento" aria-label="Filtrar por tipo de movimiento">
                    <option value="">Todos</option>
                    <option value="deposito">Solo depósitos</option>
                    <option value="extraccion">Solo extracciones</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="orden-movimientos" class="form-label small mb-1">Ordenar por</label>
                  <select class="form-select form-select-sm" id="orden-movimientos" aria-label="Ordenar movimientos">
                    <option value="fecha-desc">Fecha: más recientes</option>
                    <option value="fecha-asc">Fecha: más antiguos</option>
                    <option value="monto-desc">Monto: mayor a menor</option>
                    <option value="monto-asc">Monto: menor a mayor</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="busqueda-movimientos" class="form-label small mb-1">Buscar en descripción</label>
                  <input type="search" class="form-control form-control-sm" id="busqueda-movimientos" placeholder="Ej: comisión, pago..." autocomplete="off" aria-label="Buscar en la descripción del movimiento">
                </div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-body p-0">
              <div id="lista-movimientos" class="lista-movimientos" aria-live="polite">
                <!-- Se llena con JavaScript -->
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- Columna: tarjetas -->
      <div class="col-lg-5">
        <section id="tarjetas">
          <h3 class="h5 mb-3">Mis Tarjetas</h3>
          <div class="formulario-tarjeta mb-4">
            <form id="form-tarjeta" novalidate>
              <div class="mb-3">
                <label for="tipo-tarjeta" class="form-label">Tipo de tarjeta</label>
                <select class="form-select" id="tipo-tarjeta">
                  <option value="Débito">Débito</option>
                  <option value="Crédito">Crédito</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="digitos-tarjeta" class="form-label">Últimos 4 dígitos</label>
                <input type="text" class="form-control" id="digitos-tarjeta" maxlength="4" placeholder="Ej: 1234" pattern="[0-9]{4}" inputmode="numeric" required aria-required="true" aria-describedby="ayuda-digitos">
                <div id="ayuda-digitos" class="form-text">Exactamente 4 dígitos numéricos (sin espacios).</div>
              </div>
              <div class="mb-3">
                <label for="vencimiento-tarjeta" class="form-label">Vencimiento</label>
                <input type="text" class="form-control" id="vencimiento-tarjeta" placeholder="MM/AA" required aria-required="true" aria-describedby="ayuda-vencimiento" maxlength="5">
                <div id="ayuda-vencimiento" class="form-text">Formato MM/AA y la tarjeta no debe estar vencida.</div>
              </div>
              <button type="submit" class="btn btn-outline-primary">Agregar tarjeta</button>
            </form>
            <div id="mensaje-tarjeta" class="mensaje-usuario" role="status"></div>
          </div>
          <div class="card">
            <div class="card-body">
              <div id="lista-tarjetas" aria-live="polite">
                <!-- Se llena con JavaScript -->
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>
</html>
